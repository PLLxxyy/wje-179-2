<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>音乐练习打卡平台</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #6C5CE7;
      --primary-dark: #5A4BD1;
      --primary-light: #A29BFE;
      --secondary: #00CEC9;
      --accent: #FD79A8;
      --success: #00B894;
      --danger: #FF6B6B;
      --warning: #FDCB6E;
      --bg: #F8F9FE;
      --card: #FFFFFF;
      --text: #2D3436;
      --text-light: #636E72;
      --text-muted: #B2BEC3;
      --border: #E8E8F0;
      --shadow: 0 2px 12px rgba(108, 92, 231, 0.08);
      --shadow-lg: 0 8px 30px rgba(108, 92, 231, 0.12);
      --radius: 12px;
      --radius-sm: 8px;
      --transition: all 0.2s ease;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    a {
      color: var(--primary);
      text-decoration: none;
    }

    a:hover {
      color: var(--primary-dark);
    }

    /* Layout */
    .app-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .main-content {
      flex: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px;
      width: 100%;
    }

    /* Navbar */
    .navbar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }

    .navbar-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }

    .navbar-logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .navbar-links {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .navbar-links a, .navbar-links button {
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      color: var(--text-light);
      transition: var(--transition);
      border: none;
      background: none;
      cursor: pointer;
      font-family: inherit;
    }

    .navbar-links a:hover, .navbar-links button:hover {
      background: var(--bg);
      color: var(--primary);
    }

    .navbar-links a.active {
      background: var(--primary);
      color: white;
    }

    .navbar-user {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      color: var(--text-light);
    }

    .navbar-user .username {
      font-weight: 600;
      color: var(--text);
    }

    .btn-logout {
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: var(--danger);
      border: 1px solid var(--danger);
      background: transparent;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
    }

    .btn-logout:hover {
      background: var(--danger);
      color: white;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(108, 92, 231, 0.3);
    }

    .btn-secondary {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .btn-success {
      background: var(--success);
      color: white;
    }

    .btn-success:hover {
      background: #00a884;
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover {
      background: #e55a5a;
    }

    .btn-lg {
      padding: 14px 32px;
      font-size: 16px;
      border-radius: var(--radius);
    }

    .btn-block {
      width: 100%;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }

    /* Cards */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .card-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Forms */
    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--card);
      transition: var(--transition);
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.1);
    }

    .form-textarea {
      resize: vertical;
      min-height: 80px;
    }

    /* Auth pages */
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #6C5CE7 0%, #A29BFE 50%, #74B9FF 100%);
      padding: 20px;
    }

    .auth-card {
      background: var(--card);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-lg);
    }

    .auth-card h1 {
      font-size: 24px;
      text-align: center;
      margin-bottom: 8px;
      color: var(--primary);
    }

    .auth-card .subtitle {
      text-align: center;
      color: var(--text-light);
      margin-bottom: 28px;
      font-size: 14px;
    }

    .auth-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: var(--text-light);
    }

    .auth-link a {
      font-weight: 600;
    }

    /* Page header */
    .page-header {
      margin-bottom: 24px;
    }

    .page-header h1 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .page-header p {
      color: var(--text-light);
      font-size: 14px;
    }

    /* Grid */
    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    @media (max-width: 768px) {
      .grid-2, .grid-3, .grid-4 {
        grid-template-columns: 1fr;
      }
    }

    /* Stat card */
    .stat-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .stat-card .stat-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .stat-card .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
    }

    .stat-card .stat-unit {
      font-size: 14px;
      color: var(--text-light);
      font-weight: 400;
    }

    /* Weekly calendar */
    .week-calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .day-cell {
      background: var(--card);
      border-radius: var(--radius-sm);
      padding: 14px 10px;
      text-align: center;
      border: 2px solid var(--border);
      transition: var(--transition);
      position: relative;
    }

    .day-cell.today {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(108, 92, 231, 0.15);
    }

    .day-cell.goal-met {
      border-color: var(--success);
      background: linear-gradient(135deg, rgba(0, 184, 148, 0.05), rgba(0, 184, 148, 0.1));
    }

    .day-cell.goal-not-met {
      border-color: var(--danger);
      background: linear-gradient(135deg, rgba(255, 107, 107, 0.05), rgba(255, 107, 107, 0.1));
    }

    .day-cell.future {
      opacity: 0.4;
    }

    .day-cell .day-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-light);
      margin-bottom: 6px;
    }

    .day-cell .day-date {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .day-cell .day-duration {
      font-size: 18px;
      font-weight: 700;
    }

    .day-cell .day-unit {
      font-size: 11px;
      color: var(--text-light);
    }

    .day-cell .day-status {
      font-size: 12px;
      margin-top: 4px;
    }

    /* Streak */
    .streak-display {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      background: linear-gradient(135deg, #FF6B6B, #FD79A8);
      border-radius: var(--radius);
      color: white;
      margin-bottom: 20px;
    }

    .streak-fire {
      font-size: 32px;
    }

    .streak-info .streak-count {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }

    .streak-info .streak-label {
      font-size: 13px;
      opacity: 0.9;
    }

    /* Timer */
    .timer-container {
      text-align: center;
      padding: 40px 20px;
    }

    .timer-display {
      font-size: 72px;
      font-weight: 700;
      color: var(--primary);
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .timer-display.running {
      color: var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .timer-status {
      font-size: 16px;
      color: var(--text-light);
      margin-bottom: 32px;
    }

    .timer-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .timer-btn {
      width: 120px;
      height: 50px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
    }

    .timer-btn-start {
      background: var(--success);
      color: white;
    }

    .timer-btn-start:hover {
      background: #00a884;
      transform: scale(1.05);
    }

    .timer-btn-stop {
      background: var(--danger);
      color: white;
    }

    .timer-btn-stop:hover {
      background: #e55a5a;
      transform: scale(1.05);
    }

    .timer-btn-reset {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .timer-btn-reset:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* Practice form */
    .practice-form {
      max-width: 500px;
      margin: 20px auto 0;
    }

    /* Leaderboard */
    .leaderboard-table {
      width: 100%;
      border-collapse: collapse;
    }

    .leaderboard-table th {
      text-align: left;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      border-bottom: 2px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .leaderboard-table td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }

    .leaderboard-table tr:hover {
      background: var(--bg);
    }

    .leaderboard-table tr.me {
      background: rgba(108, 92, 231, 0.06);
    }

    .leaderboard-table tr.me td {
      font-weight: 600;
      color: var(--primary);
    }

    .rank-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: 13px;
      font-weight: 700;
    }

    .rank-1 {
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: white;
    }

    .rank-2 {
      background: linear-gradient(135deg, #C0C0C0, #A0A0A0);
      color: white;
    }

    .rank-3 {
      background: linear-gradient(135deg, #CD7F32, #B87333);
      color: white;
    }

    .rank-other {
      background: var(--bg);
      color: var(--text-light);
    }

    .instrument-tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .tag-piano { background: #E8F5E9; color: #2E7D32; }
    .tag-guitar { background: #FFF3E0; color: #E65100; }
    .tag-violin { background: #E3F2FD; color: #1565C0; }
    .tag-drums { background: #FCE4EC; color: #C62828; }

    /* Community */
    .post-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      margin-bottom: 16px;
      transition: var(--transition);
    }

    .post-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .post-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .post-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--primary-light);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 14px;
    }

    .post-meta {
      flex: 1;
    }

    .post-author {
      font-weight: 600;
      font-size: 14px;
    }

    .post-time {
      font-size: 12px;
      color: var(--text-muted);
    }

    .post-type-badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge-xinde { background: #E8F5E9; color: #2E7D32; }
    .badge-tuijian { background: #E3F2FD; color: #1565C0; }

    .post-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
    }

    .post-content {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .post-footer {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .post-action {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: var(--transition);
      background: none;
      border: none;
      font-family: inherit;
      font-size: 13px;
      color: var(--text-muted);
      padding: 4px 8px;
      border-radius: var(--radius-sm);
    }

    .post-action:hover {
      color: var(--primary);
      background: rgba(108, 92, 231, 0.06);
    }

    .post-action.liked {
      color: var(--accent);
    }

    /* Comments */
    .comments-section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .comment-item {
      display: flex;
      gap: 10px;
      padding: 10px 0;
      font-size: 14px;
    }

    .comment-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--primary-light);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .comment-body {
      flex: 1;
    }

    .comment-author {
      font-weight: 600;
      margin-right: 8px;
    }

    .comment-time {
      font-size: 12px;
      color: var(--text-muted);
    }

    .comment-form {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .comment-form input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-family: inherit;
    }

    .comment-form input:focus {
      outline: none;
      border-color: var(--primary);
    }

    /* Filter bar */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text-light);
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
    }

    .filter-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .filter-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* Charts (simple CSS charts) */
    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 200px;
      padding: 0 10px;
    }

    .bar-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .bar {
      width: 100%;
      max-width: 40px;
      background: linear-gradient(to top, var(--primary), var(--primary-light));
      border-radius: 4px 4px 0 0;
      min-height: 4px;
      transition: height 0.5s ease;
    }

    .bar-label {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .bar-value {
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
    }

    /* Pie chart (CSS-based) */
    .pie-chart-container {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .pie-legend {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .pie-legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .pie-legend-color {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      border-bottom: 2px solid var(--border);
      padding-bottom: 0;
    }

    .tab {
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-light);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: var(--transition);
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      font-family: inherit;
    }

    .tab:hover {
      color: var(--primary);
    }

    .tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }

    .modal {
      background: var(--card);
      border-radius: var(--radius);
      padding: 28px;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    /* Profile page */
    .profile-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
    }

    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 32px;
      font-weight: 700;
    }

    .profile-info h2 {
      font-size: 22px;
      margin-bottom: 4px;
    }

    .profile-info p {
      color: var(--text-light);
      font-size: 14px;
    }

    /* Admin stats */
    .admin-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    @media (max-width: 768px) {
      .admin-grid { grid-template-columns: 1fr; }
    }

    .admin-stat {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .admin-stat .icon {
      font-size: 36px;
      margin-bottom: 8px;
    }

    .admin-stat .value {
      font-size: 32px;
      font-weight: 700;
      color: var(--primary);
    }

    .admin-stat .label {
      font-size: 14px;
      color: var(--text-light);
      margin-top: 4px;
    }

    /* Table */
    .table-container {
      overflow-x: auto;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
    }

    .data-table th {
      text-align: left;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      border-bottom: 2px solid var(--border);
    }

    .data-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }

    .data-table tr:hover {
      background: var(--bg);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .empty-state p {
      font-size: 15px;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    .loading::after {
      content: '';
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-left: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Alert */
    .alert {
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      margin-bottom: 16px;
    }

    .alert-success {
      background: rgba(0, 184, 148, 0.1);
      color: var(--success);
      border: 1px solid rgba(0, 184, 148, 0.2);
    }

    .alert-error {
      background: rgba(255, 107, 107, 0.1);
      color: var(--danger);
      border: 1px solid rgba(255, 107, 107, 0.2);
    }

    /* Toast */
    .toast-container {
      position: fixed;
      top: 80px;
      right: 20px;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: white;
      animation: slideIn 0.3s ease;
      box-shadow: var(--shadow-lg);
    }

    .toast-success {
      background: var(--success);
    }

    .toast-error {
      background: var(--danger);
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .week-calendar {
        grid-template-columns: repeat(7, 1fr);
        gap: 4px;
      }

      .day-cell {
        padding: 8px 4px;
      }

      .day-cell .day-duration {
        font-size: 14px;
      }

      .timer-display {
        font-size: 48px;
      }

      .auth-card {
        padding: 24px;
      }

      .navbar-inner {
        height: auto;
        flex-wrap: wrap;
        padding: 8px 0;
      }

      .navbar-links {
        flex-wrap: wrap;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
